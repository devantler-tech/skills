name: 🚀 CD

on:
  workflow_call:
    inputs:
      tag:
        description: Version tag for the release (semver, e.g. v1.0.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag for the release (semver, e.g. v1.0.0)
        required: true
        type: string

concurrency:
  group: publish-skills
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Publish skills release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔧 Ensure gh >= 2.90.0
        env:
          GH_MIN_VERSION: 2.90.0
        run: |
          if gh skill --help >/dev/null 2>&1; then
            echo "Installed gh ($(gh --version | awk '/gh version/{print $3}')) already supports 'gh skill'."
            exit 0
          fi
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_MIN_VERSION}/gh_${GH_MIN_VERSION}_linux_amd64.tar.gz" \
            | tar -xzC "$tmp"
          install_dir="${RUNNER_TEMP:-/tmp}/bin"
          mkdir -p "$install_dir"
          install "$tmp/gh_${GH_MIN_VERSION}_linux_amd64/bin/gh" "$install_dir/gh"
          echo "$install_dir" >> "$GITHUB_PATH"
          export PATH="$install_dir:$PATH"
          hash -r
          gh --version

      - name: 📦 Publish skills release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: gh skill publish --tag "$TAG"

