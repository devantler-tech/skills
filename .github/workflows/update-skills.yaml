name: 🔄 Update skills

on:
  schedule:
    # Weekly, Mondays 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: false

permissions: {}

jobs:
  discover:
    name: Discover skills
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skills: ${{ steps.matrix.outputs.skills }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔧 Install yq
        env:
          YQ_VERSION: v4.45.1
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: 📋 Build matrix from skills-lock.yaml
        id: matrix
        run: |
          skills=$(yq -o=json -I=0 '.skills | keys' skills-lock.yaml)
          echo "skills=$skills" >> "$GITHUB_OUTPUT"
          echo "Discovered: $skills"

  update:
    name: Update ${{ matrix.skill }}
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        skill: ${{ fromJSON(needs.discover.outputs.skills) }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 🔧 Install yq
        env:
          YQ_VERSION: v4.45.1
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: 🔧 Ensure gh >= 2.90.0
        env:
          GH_MIN_VERSION: 2.90.0
        run: |
          if gh skill --help >/dev/null 2>&1; then
            echo "Installed gh ($(gh --version | awk '/gh version/{print $3}')) already supports 'gh skill'."
            exit 0
          fi
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_MIN_VERSION}/gh_${GH_MIN_VERSION}_linux_amd64.tar.gz" \
            | tar -xzC "$tmp"
          sudo install "$tmp/gh_${GH_MIN_VERSION}_linux_amd64/bin/gh" /usr/local/bin/gh
          gh --version

      - name: 🔄 Sync ${{ matrix.skill }} from upstream
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/update-skill.sh "${{ matrix.skill }}"

      - name: ✅ Validate skill against agentskills.io spec
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh skill publish --dry-run

      - name: 🌿 Create branch, commit, open PR
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKILL: ${{ matrix.skill }}
          UPSTREAM_REPO: ${{ steps.sync.outputs.repo }}
          OLD_COMMIT: ${{ steps.sync.outputs.old_commit }}
          NEW_COMMIT: ${{ steps.sync.outputs.new_commit }}
          NEW_TREE: ${{ steps.sync.outputs.new_tree }}
        run: |
          set -euo pipefail

          short_new="${NEW_COMMIT:0:7}"
          short_old="${OLD_COMMIT:0:7}"
          branch="chore/update-skill-${SKILL}-${short_new}"
          title="chore(deps): bump ${SKILL} to ${short_new}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          existing=$(gh pr list --state open --head "$branch" --json number --jq 'length')
          if [[ "$existing" != "0" ]]; then
            echo "PR for $branch already open — skipping."
            exit 0
          fi

          git checkout -b "$branch"
          git add "$SKILL" skills-lock.yaml
          git commit -m "$title" \
            -m "Syncs \`${SKILL}\` with upstream \`${UPSTREAM_REPO}\`." \
            -m "Upstream diff: https://github.com/${UPSTREAM_REPO}/compare/${OLD_COMMIT}...${NEW_COMMIT}"
          git push --force-with-lease origin "$branch"

          body=$(printf '%s\n' \
            "Automated sync of the \`${SKILL}\` skill from its upstream source." \
            "" \
            "- **Upstream:** [\`${UPSTREAM_REPO}\`](https://github.com/${UPSTREAM_REPO})" \
            "- **Range:** [\`${short_old}...${short_new}\`](https://github.com/${UPSTREAM_REPO}/compare/${OLD_COMMIT}...${NEW_COMMIT})" \
            "- **Tree SHA:** \`${NEW_TREE}\`" \
            "" \
            "Validated by \`gh skill publish --dry-run\` before opening this PR." \
            "Generated by \`.github/workflows/update-skills.yaml\`." \
            "Follows the [devantler-tech PR template](https://github.com/devantler-tech/.github)."
          )

          gh pr create \
            --base main \
            --head "$branch" \
            --title "$title" \
            --body "$body"
