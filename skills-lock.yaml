# skills-lock.yaml — upstream sources for the third-party skills in this repo.
#
# The `update-skills` workflow reads this file and opens a pull request for
# each skill whose upstream *content* has changed, using the tree SHA of the
# skill's source directory for content-addressed change detection (matching
# the scheme `gh skill` uses internally — see
# https://github.blog/changelog/2026-04-16-manage-agent-skills-with-github-cli/).
#
# Fields per skill:
#   repo   — owner/name of the upstream GitHub repository.
#   path   — path to the skill directory within that repository.
#   ref    — branch, tag, or commit ref to follow for updates.
#   commit — commit SHA last synced; used for the compare URL in PRs.
#   tree   — tree SHA of <path> at <commit>; used to detect real content changes.
#
# Hand-edit `repo`, `path`, or `ref` to change upstream; `commit` and `tree`
# are bumped by the workflow.
